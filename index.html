<!DOCTYPE html>
<html>
<head>
<title>NJV QR Generator</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0c1d40,#020611);
color:white;
overflow:hidden;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.98)}
to{opacity:1;transform:scale(1)}
}

/* moving stars */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.15;
animation:stars 80s linear infinite;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-1200px)}
}

/* card */

.container{
position:relative;
width:420px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(0,150,255,0.2);
text-align:center;
animation:cardFloat 6s ease-in-out infinite;
}

@keyframes cardFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* title */

h1{
margin-top:0;
font-size:30px;
background:linear-gradient(90deg,#6ea8ff,#8a7dff,#33d6ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#aaa;
font-size:14px;
margin-bottom:25px;
}

/* input */

input{
width:100%;
padding:13px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
transition:0.3s;
}

input:focus{
box-shadow:0 0 12px rgba(80,160,255,0.5);
}

/* button */

button{
width:100%;
margin-top:15px;
padding:13px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(90deg,#6ea8ff,#8a7dff,#33d6ff);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(80,160,255,0.6);
}

/* QR box */

#qrcode{
margin-top:25px;
padding:20px;
background:white;
border-radius:15px;
display:inline-block;
transform:scale(0);
transition:0.4s;
}

#qrcode.show{
transform:scale(1);
}

/* download */

#downloadBtn{
display:none;
margin-top:15px;
background:#1dd1a1;
animation:fadeIn 0.5s ease;
}

</style>
</head>

<body>

<div class="container">

<h1>NJV QR Generator</h1>
<div class="subtitle">Create shareable QR codes instantly</div>

<input id="text" placeholder="Paste link or text">

<button onclick="generateQR()">Generate QR Code</button>

<div id="qrcode"></div>

<button id="downloadBtn" onclick="downloadQR()">Download QR Code</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>

function generateQR(){

let box=document.getElementById("qrcode");
box.innerHTML="";
box.classList.remove("show");

let text=document.getElementById("text").value;

if(text===""){
alert("Enter text or link");
return;
}

new QRCode(box,{
text:text,
width:200,
height:200
});

setTimeout(()=>{
box.classList.add("show");
document.getElementById("downloadBtn").style.display="block";
},200);

}

function downloadQR(){

let img=document.querySelector("#qrcode img");

let link=document.createElement("a");
link.href=img.src;
link.download="qr-code.png";
link.click();

}

</script>

</body>
</html>
